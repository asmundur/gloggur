name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (for example: 0.1.1)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Resolve package version
        id: resolve_version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            raw_version="${{ github.event.release.tag_name }}"
          else
            raw_version="${{ inputs.version }}"
          fi
          version="${raw_version#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-]?[0-9A-Za-z]+)*$ ]]; then
            echo "Invalid version: $raw_version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Set package version
        env:
          PACKAGE_VERSION: ${{ steps.resolve_version.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["PACKAGE_VERSION"]

          pyproject = pathlib.Path("pyproject.toml")
          pyproject_text = pyproject.read_text(encoding="utf-8")
          pyproject_text, pyproject_updates = re.subn(
              r'(?m)^version = ".*"$',
              f'version = "{version}"',
              pyproject_text,
              count=1,
          )
          if pyproject_updates != 1:
              raise RuntimeError("Failed to update version in pyproject.toml")
          pyproject.write_text(pyproject_text, encoding="utf-8")

          package_init = pathlib.Path("src/gloggur/__init__.py")
          package_init_text = package_init.read_text(encoding="utf-8")
          package_init_text, init_updates = re.subn(
              r'(?m)^__version__ = ".*"$',
              f'__version__ = "{version}"',
              package_init_text,
              count=1,
          )
          if init_updates != 1:
              raise RuntimeError("Failed to update __version__ in src/gloggur/__init__.py")
          package_init.write_text(package_init_text, encoding="utf-8")

          print(f"Set package version to {version}")
          PY
      - name: Build distributions
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
