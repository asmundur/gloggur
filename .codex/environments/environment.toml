# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "gloggur"

[setup]
script = '''
set -euo pipefail

REPO_ROOT="$(git rev-parse --show-toplevel)"
COMMON_GIT_DIR="$(git rev-parse --git-common-dir)"
if [ "${COMMON_GIT_DIR#/}" = "${COMMON_GIT_DIR}" ]; then
  COMMON_GIT_DIR="$(cd "${REPO_ROOT}/${COMMON_GIT_DIR}" && pwd)"
fi
PRIMARY_REPO_ROOT="$(cd "${COMMON_GIT_DIR}/.." && pwd)"

link_shared_path() {
  LINK_PATH="$1"
  TARGET_PATH="$2"
  if [ "${LINK_PATH}" = "${TARGET_PATH}" ]; then
    return 0
  fi
  if [ -L "${LINK_PATH}" ]; then
    ln -sfn "${TARGET_PATH}" "${LINK_PATH}"
  elif [ ! -e "${LINK_PATH}" ]; then
    ln -s "${TARGET_PATH}" "${LINK_PATH}"
  else
    echo "Skipping symlink: ${LINK_PATH} exists and is not a symlink." >&2
  fi
}

# 0) Shared cache + shared venv (once per repo, not once per worktree)
export PIP_CACHE_DIR="${PIP_CACHE_DIR:-$HOME/.cache/pip}"
mkdir -p "$PIP_CACHE_DIR"
SHARED_CACHE="${PRIMARY_REPO_ROOT}/.gloggur-cache"
SHARED_VENV="${PRIMARY_REPO_ROOT}/.venv"
INSTALL_SPEC="${GLOGGUR_SETUP_INSTALL_SPEC:-.}"
mkdir -p "${SHARED_CACHE}"

if command -v python3 >/dev/null 2>&1; then
  PYTHON_BIN="$(command -v python3)"
elif command -v python >/dev/null 2>&1; then
  PYTHON_BIN="$(command -v python)"
else
  echo "No python interpreter found. Install Python 3.10+ and retry." >&2
  exit 3
fi

if [ ! -x "${SHARED_VENV}/bin/python" ]; then
  "$PYTHON_BIN" -m venv "${SHARED_VENV}"
fi

if command -v shasum >/dev/null 2>&1; then
  REQ_HASH="$(shasum -a 256 "${REPO_ROOT}/pyproject.toml" | awk '{print $1}')"
elif command -v sha256sum >/dev/null 2>&1; then
  REQ_HASH="$(sha256sum "${REPO_ROOT}/pyproject.toml" | awk '{print $1}')"
else
  echo "Missing shasum/sha256sum; cannot compute dependency stamp." >&2
  exit 4
fi

STAMP_FILE="${SHARED_VENV}/.install-hash"
NEEDS_INSTALL=0
if [ ! -f "${STAMP_FILE}" ]; then
  NEEDS_INSTALL=1
elif [ "$(cat "${STAMP_FILE}")" != "${REQ_HASH}" ]; then
  NEEDS_INSTALL=1
fi

if [ "${NEEDS_INSTALL}" -eq 1 ]; then
  cd "${REPO_ROOT}"
  "${SHARED_VENV}/bin/python" -m pip install --upgrade pip setuptools wheel
  "${SHARED_VENV}/bin/python" -m pip install -e "${INSTALL_SPEC}"
  printf '%s' "${REQ_HASH}" > "${STAMP_FILE}"
fi

# 1) Ensure each worktree points at shared repo-root state
link_shared_path "${REPO_ROOT}/.venv" "${SHARED_VENV}"
if [ -L "${REPO_ROOT}/.gloggur-cache" ]; then
  rm -f "${REPO_ROOT}/.gloggur-cache"
fi
if [ ! -e "${REPO_ROOT}/.gloggur-cache" ]; then
  mkdir -p "${REPO_ROOT}/.gloggur-cache"
  if [ -d "${SHARED_CACHE}" ]; then
    cp -R "${SHARED_CACHE}/." "${REPO_ROOT}/.gloggur-cache/"
  fi
elif [ ! -d "${REPO_ROOT}/.gloggur-cache" ]; then
  echo "Skipping cache seed: ${REPO_ROOT}/.gloggur-cache exists and is not a directory." >&2
fi

# 2) Ensure user shell PATH is stable
ZSHRC="$HOME/.zshrc"
touch "$ZSHRC"
BADLINE='export PATH="$PWD/scripts:$PATH"'
if grep -qxF "$BADLINE" "$ZSHRC"; then
  TMP_ZSHRC="$(mktemp)"
  grep -vxF "$BADLINE" "$ZSHRC" > "$TMP_ZSHRC"
  cat "$TMP_ZSHRC" > "$ZSHRC"
  rm -f "$TMP_ZSHRC"
fi

# 3) Stable wrapper that works in any worktree
BIN="$HOME/.local/bin"
mkdir -p "$BIN"
cat > "$BIN/gloggur" <<'SH'
#!/usr/bin/env bash
set -euo pipefail

is_json=0
for arg in "$@"; do
  if [[ "$arg" == "--json" ]]; then
    is_json=1
    break
  fi
done

emit_launch_target_missing() {
  local install_root="$1"
  local launcher_path="$2"
  if [[ $is_json -eq 1 ]]; then
    printf '{\n'
    printf '  "operation": "wrapper",\n'
    printf '  "error": true,\n'
    printf '  "error_code": "wrapper_launch_target_missing",\n'
    printf '  "message": "Unable to locate executable scripts/gloggur launcher from install root.",\n'
    printf '  "remediation": [\n'
    printf '    "Set GLOGGUR_INSTALL_ROOT to a gloggur checkout with scripts/gloggur.",\n'
    printf '    "Run scripts/bootstrap_gloggur_env.sh in that checkout to repair local tooling."\n'
    printf '  ],\n'
    printf '  "detected_environment": {\n'
    printf '    "cwd": "%s",\n' "$(pwd -P)"
    printf '    "install_root": "%s",\n' "$install_root"
    printf '    "launcher_path": "%s"\n' "$launcher_path"
    printf '  }\n'
    printf '}\n'
  else
    echo "gloggur wrapper failed (wrapper_launch_target_missing): launcher not found at ${launcher_path}" >&2
    echo "Set GLOGGUR_INSTALL_ROOT to a gloggur checkout and rerun scripts/bootstrap_gloggur_env.sh." >&2
  fi
}

DEFAULT_INSTALL_ROOT="__GLOGGUR_INSTALL_ROOT__"
INSTALL_ROOT="${GLOGGUR_INSTALL_ROOT:-$DEFAULT_INSTALL_ROOT}"
LAUNCHER="${INSTALL_ROOT}/scripts/gloggur"
if [[ ! -x "$LAUNCHER" ]]; then
  emit_launch_target_missing "$INSTALL_ROOT" "$LAUNCHER"
  exit 1
fi

SHARED_VENV="${INSTALL_ROOT}/.venv"
if [[ -x "${SHARED_VENV}/bin/python" ]]; then
  export GLOGGUR_PREFLIGHT_VENV_PYTHON="${SHARED_VENV}/bin/python"
fi

export GLOGGUR_RUN_FROM_CALLER_CWD=1
exec "$LAUNCHER" "$@"
SH
perl -pi -e "s|__GLOGGUR_INSTALL_ROOT__|${REPO_ROOT}|g" "$BIN/gloggur"
chmod +x "$BIN/gloggur"

# 4) Install into a PATH dir Codex already sees (best effort)
for CANDIDATE in /opt/homebrew/bin /usr/local/bin; do
  if [ -d "$CANDIDATE" ] && [ -w "$CANDIDATE" ]; then
    ln -sf "$BIN/gloggur" "$CANDIDATE/gloggur"
    break
  fi
done

# 5) Ensure ~/.local/bin is on PATH for zsh
BINLINE='export PATH="$HOME/.local/bin:$PATH"'
grep -qxF "$BINLINE" "$ZSHRC" || echo "$BINLINE" >> "$ZSHRC"

# 6) Ensure worktree watch mode is initialized and running
WATCH_CONFIG_PATH="${REPO_ROOT}/.gloggur.yaml"
"${REPO_ROOT}/scripts/gloggur" watch init "${REPO_ROOT}" --config "${WATCH_CONFIG_PATH}" --json >/dev/null
"${REPO_ROOT}/scripts/gloggur" watch start --config "${WATCH_CONFIG_PATH}" --daemon --json >/dev/null
'''
