# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "gloggur"

[setup]
script = '''
set -euo pipefail

REPO_ROOT="$(git rev-parse --show-toplevel)"
COMMON_GIT_DIR="$(git rev-parse --git-common-dir)"
if [ "${COMMON_GIT_DIR#/}" = "${COMMON_GIT_DIR}" ]; then
  COMMON_GIT_DIR="$(cd "${REPO_ROOT}/${COMMON_GIT_DIR}" && pwd)"
fi
PRIMARY_REPO_ROOT="$(cd "${COMMON_GIT_DIR}/.." && pwd)"

link_shared_path() {
  LINK_PATH="$1"
  TARGET_PATH="$2"
  if [ "${LINK_PATH}" = "${TARGET_PATH}" ]; then
    return 0
  fi
  if [ -L "${LINK_PATH}" ]; then
    ln -sfn "${TARGET_PATH}" "${LINK_PATH}"
  elif [ ! -e "${LINK_PATH}" ]; then
    ln -s "${TARGET_PATH}" "${LINK_PATH}"
  else
    echo "Skipping symlink: ${LINK_PATH} exists and is not a symlink." >&2
  fi
}

# 0) Shared cache + shared venv (once per repo, not once per worktree)
export PIP_CACHE_DIR="${PIP_CACHE_DIR:-$HOME/.cache/pip}"
mkdir -p "$PIP_CACHE_DIR"
SHARED_CACHE="${PRIMARY_REPO_ROOT}/.gloggur-cache"
SHARED_VENV="${PRIMARY_REPO_ROOT}/.venv"
INSTALL_SPEC="${GLOGGUR_SETUP_INSTALL_SPEC:-.}"
mkdir -p "${SHARED_CACHE}"

if command -v python3 >/dev/null 2>&1; then
  PYTHON_BIN="$(command -v python3)"
elif command -v python >/dev/null 2>&1; then
  PYTHON_BIN="$(command -v python)"
else
  echo "No python interpreter found. Install Python 3.10+ and retry." >&2
  exit 3
fi

if [ ! -x "${SHARED_VENV}/bin/python" ]; then
  "$PYTHON_BIN" -m venv "${SHARED_VENV}"
fi

if command -v shasum >/dev/null 2>&1; then
  REQ_HASH="$(shasum -a 256 "${REPO_ROOT}/pyproject.toml" | awk '{print $1}')"
elif command -v sha256sum >/dev/null 2>&1; then
  REQ_HASH="$(sha256sum "${REPO_ROOT}/pyproject.toml" | awk '{print $1}')"
else
  echo "Missing shasum/sha256sum; cannot compute dependency stamp." >&2
  exit 4
fi

STAMP_FILE="${SHARED_VENV}/.install-hash"
NEEDS_INSTALL=0
if [ ! -f "${STAMP_FILE}" ]; then
  NEEDS_INSTALL=1
elif [ "$(cat "${STAMP_FILE}")" != "${REQ_HASH}" ]; then
  NEEDS_INSTALL=1
fi

if [ "${NEEDS_INSTALL}" -eq 1 ]; then
  cd "${REPO_ROOT}"
  "${SHARED_VENV}/bin/python" -m pip install --upgrade pip setuptools wheel
  "${SHARED_VENV}/bin/python" -m pip install -e "${INSTALL_SPEC}"
  printf '%s' "${REQ_HASH}" > "${STAMP_FILE}"
fi

# 1) Ensure each worktree points at shared repo-root state
link_shared_path "${REPO_ROOT}/.venv" "${SHARED_VENV}"
link_shared_path "${REPO_ROOT}/.gloggur-cache" "${SHARED_CACHE}"

# 2) Ensure user shell PATH is stable
ZSHRC="$HOME/.zshrc"
touch "$ZSHRC"
BADLINE='export PATH="$PWD/scripts:$PATH"'
if grep -qxF "$BADLINE" "$ZSHRC"; then
  TMP_ZSHRC="$(mktemp)"
  grep -vxF "$BADLINE" "$ZSHRC" > "$TMP_ZSHRC"
  cat "$TMP_ZSHRC" > "$ZSHRC"
  rm -f "$TMP_ZSHRC"
fi

# 3) Stable wrapper that works in any worktree
BIN="$HOME/.local/bin"
mkdir -p "$BIN"
cat > "$BIN/gloggur" <<'SH'
#!/usr/bin/env bash
set -euo pipefail

REPO_ROOT="$(git rev-parse --show-toplevel 2>/dev/null || true)"
if [ -z "${REPO_ROOT}" ] || [ ! -x "${REPO_ROOT}/scripts/gloggur" ]; then
  echo "gloggur wrapper: run inside a gloggur git worktree." >&2
  exit 1
fi

COMMON_GIT_DIR="$(git -C "${REPO_ROOT}" rev-parse --git-common-dir)"
if [ "${COMMON_GIT_DIR#/}" = "${COMMON_GIT_DIR}" ]; then
  COMMON_GIT_DIR="$(cd "${REPO_ROOT}/${COMMON_GIT_DIR}" && pwd)"
fi

SHARED_VENV="${COMMON_GIT_DIR}/gloggur-venv"
if [ -x "${SHARED_VENV}/bin/python" ]; then
  export GLOGGUR_PREFLIGHT_VENV_PYTHON="${SHARED_VENV}/bin/python"
fi

exec "${REPO_ROOT}/scripts/gloggur" "$@"
SH
chmod +x "$BIN/gloggur"

# 4) Install into a PATH dir Codex already sees (best effort)
for CANDIDATE in /opt/homebrew/bin /usr/local/bin; do
  if [ -d "$CANDIDATE" ] && [ -w "$CANDIDATE" ]; then
    ln -sf "$BIN/gloggur" "$CANDIDATE/gloggur"
    break
  fi
done

# 5) Ensure ~/.local/bin is on PATH for zsh
BINLINE='export PATH="$HOME/.local/bin:$PATH"'
grep -qxF "$BINLINE" "$ZSHRC" || echo "$BINLINE" >> "$ZSHRC"
'''
